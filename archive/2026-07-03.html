<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI支付场景雷达</title>
<style>
  :root {
    --jd-red: #E2231A;
    --jd-red-light: #FFF1F0;
    --jd-red-soft: #FFDAD6;
    --bg: #F7F8FC;
    --bg-white: #FFFFFF;
    --text-primary: #1A1D2E;
    --text-secondary: #6B7280;
    --text-tertiary: #9CA3AF;
    --border: #E8ECF4;
    --border-light: #F0F2F8;
    --accent-blue: #3B82F6;
    --accent-blue-light: #EFF6FF;
    --accent-green: #10B981;
    --accent-green-light: #ECFDF5;
    --accent-amber: #F59E0B;
    --accent-amber-light: #FFFBEB;
    --accent-purple: #8B5CF6;
    --accent-purple-light: #F5F3FF;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.03);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: var(--bg-white);
    padding: 32px 20px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 20px; right: 20px;
    height: 3px;
    background: linear-gradient(90deg, var(--jd-red), var(--accent-blue), var(--accent-green));
    border-radius: 3px;
  }
  .header-label {
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .header-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-primary);
  }
  .header-title .icon { font-size: 30px; }
  .header-date {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 16px;
    margin: 16px 12px 0;
    background: var(--bg-white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
  }
  .stat-item {
    text-align: center;
    padding: 10px 4px;
    border-radius: var(--radius-sm);
    transition: background 0.2s;
  }
  .stat-item:hover { background: var(--bg); }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--jd-red);
    line-height: 1.2;
  }
  .stat-num.green { color: var(--accent-green); }
  .stat-num.blue { color: var(--accent-blue); }
  .stat-num.red { color: var(--jd-red); }
  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  /* Executive Summary */
  .exec-summary {
    margin: 16px 12px 0;
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .exec-summary::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--jd-red), var(--accent-amber));
  }
  .exec-summary-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }
  .exec-summary-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-secondary);
  }
  .exec-summary-text strong {
    color: var(--text-primary);
    font-weight: 700;
  }
  .exec-summary-text .highlight {
    color: var(--jd-red);
    font-weight: 700;
  }
  .exec-summary-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .exec-tag {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .exec-tag-red { background: var(--jd-red-light); color: var(--jd-red); }
  .exec-tag-amber { background: var(--accent-amber-light); color: #D97706; }
  .exec-tag-blue { background: var(--accent-blue-light); color: var(--accent-blue); }
  .exec-tag-green { background: var(--accent-green-light); color: var(--accent-green); }

  /* Section */
  .section {
    padding: 0 12px;
    margin-top: 20px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0 12px;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .section-header .badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge-hot { background: var(--jd-red); color: #fff; }
  .badge-new { background: var(--accent-green); color: #fff; }

  /* News Cards */
  .news-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 4px 0 12px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .news-scroll::-webkit-scrollbar { display: none; }
  .news-card {
    min-width: 260px;
    max-width: 260px;
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 20px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .news-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .news-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .news-card:nth-child(1)::before { background: var(--jd-red); }
  .news-card:nth-child(2)::before { background: var(--accent-amber); }
  .news-card:nth-child(3)::before { background: var(--accent-blue); }
  .news-rank {
    width: 24px; height: 24px;
    background: var(--jd-red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
  }
  .news-card:nth-child(2) .news-rank { background: var(--accent-amber); }
  .news-card:nth-child(3) .news-rank { background: var(--accent-blue); }
  .news-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--text-primary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-summary {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-source {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-tertiary);
    display: flex;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border-light);
  }

  /* Expandable Cards */
  .card {
    background: var(--bg-white);
    border-radius: var(--radius);
    margin-bottom: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
  }
  .card.expanded {
    border-color: var(--accent-blue);
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(59,130,246,0.08);
  }
  .card-head {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.15s;
  }
  .card-head:hover { background: var(--bg); }
  .card-head:active { background: var(--border-light); }
  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }
  .card-subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-arrow {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    transition: transform 0.3s ease;
    flex-shrink: 0;
    font-size: 12px;
    background: var(--bg);
    border-radius: 8px;
  }
  .card.expanded .card-arrow { transform: rotate(180deg); background: var(--accent-blue-light); color: var(--accent-blue); }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .card.expanded .card-body { max-height: 2000px; }
  .card-content {
    padding: 0 18px 18px;
    border-top: 1px solid var(--border-light);
  }

  /* Scene Items */
  .scene-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .scene-item:last-child { border-bottom: none; }
  .scene-name {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }
  .scene-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
    line-height: 1.7;
  }
  .scene-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag-volume { background: var(--accent-blue-light); color: var(--accent-blue); }
  .tag-tech { background: var(--accent-purple-light); color: var(--accent-purple); }
  .tag-pay { background: var(--accent-amber-light); color: var(--accent-amber); }

  /* Opportunity Indicator */
  .opp {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .opp-high { background: var(--jd-red-light); color: var(--jd-red); }
  .opp-mid { background: var(--accent-amber-light); color: #D97706; }
  .opp-low { background: var(--accent-green-light); color: var(--accent-green); }

  .opp-box {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--jd-red-light);
    border-left: 3px solid var(--jd-red);
  }
  .opp-box.mid { background: var(--accent-amber-light); border-left-color: var(--accent-amber); }
  .opp-box.low { background: var(--accent-green-light); border-left-color: var(--accent-green); }
  .opp-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--jd-red);
    margin-bottom: 4px;
  }
  .opp-box.mid .opp-title { color: #D97706; }
  .opp-box.low .opp-title { color: var(--accent-green); }
  .opp-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* Opportunity Board */
  .opp-board {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .opp-board::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--jd-red), var(--accent-amber), var(--accent-green));
  }
  .opp-board-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }
  .opp-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .opp-row:last-child { border-bottom: none; }
  .opp-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .opp-dot.high { background: var(--jd-red); box-shadow: 0 0 0 3px var(--jd-red-soft); }
  .opp-dot.mid { background: var(--accent-amber); box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
  .opp-dot.low { background: var(--accent-green); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
  .opp-text { flex: 1; }
  .opp-text-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .opp-text-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; }
  .opp-value {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
    background: var(--jd-red-light);
    color: var(--jd-red);
  }

  /* Competitor Section */
  .comp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .comp-card {
    background: var(--bg-white);
    border-radius: var(--radius-sm);
    padding: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .comp-card:hover { box-shadow: var(--shadow-md); }
  .comp-name {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-primary);
  }
  .comp-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Suggestion Box */
  .suggest-box {
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .suggest-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
  }
  .suggest-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
  }
  .suggest-item {
    padding: 12px 14px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-secondary);
    border: 1px solid var(--border-light);
  }
  .suggest-item strong {
    color: var(--text-primary);
    font-weight: 700;
  }
  .suggest-item:last-child { margin-bottom: 0; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 32px 16px;
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
  }
  .footer a { color: var(--jd-red); text-decoration: none; font-weight: 600; }
  .footer a:hover { text-decoration: underline; }

  /* Data loading placeholder */
  .data-time { font-size: 10px; color: var(--text-tertiary); }

  /* Pulse animation for live dot */
  @keyframes pulse {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent-green);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
    box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
  }

  /* Responsive tweaks */
  @media (min-width: 768px) {
    body { max-width: 680px; margin: 0 auto; }
    .header { border-radius: 0 0 var(--radius) var(--radius); }
  }
</style>
</head>

function render(data) {
  // Date
  document.getElementById('report-date').textContent = data.date;
  document.getElementById('report-week').textContent = data.week;

  // Executive Summary
  if (data.summary) {
    const tagsHtml = data.summary.tags.map(t =>
      `<span class="exec-tag exec-tag-${t.type}">${t.text}</span>`
    ).join('');
    document.getElementById('exec-summary').innerHTML = `
      <div class="exec-summary-title">📋 今日摘要</div>
      <div class="exec-summary-text">${data.summary.text}</div>
      <div class="exec-summary-tags">${tagsHtml}</div>
    `;
  }

  // Stats
  document.getElementById('stat-high').textContent = data.stats.high;
  document.getElementById('stat-scenes').textContent = data.stats.scenes;
  document.getElementById('stat-news').textContent = data.stats.news;
  document.getElementById('stat-compete').textContent = data.stats.compete;

  // News
  const newsHtml = data.news.map((n, i) => `
    <div class="news-card">
      <div class="news-rank">${i + 1}</div>
      <div class="news-title">${n.title}</div>
      <div class="news-summary">${n.summary}</div>
      <div class="news-source">
        <span>${n.source}</span>
        <span>${n.time}</span>
      </div>
    </div>
  `).join('');
  document.getElementById('news-scroll').innerHTML = newsHtml;

  // Opportunity Board
  const oppHtml = data.opportunities.map(o => `
    <div class="opp-row">
      <div class="opp-dot ${o.level === 'high' ? 'high' : o.level === 'mid' ? 'mid' : 'low'}"></div>
      <div class="opp-text">
        <div class="opp-text-title">${o.scene}</div>
        <div class="opp-text-desc">${o.reason}<br>💡 ${o.action}</div>
      </div>
      <div class="opp-value">${o.value}</div>
    </div>
  `).join('');
  document.getElementById('opp-board').innerHTML =
    `<div class="opp-board-title">🎯 商机看板 · ${data.stats.high}个高优</div>` + oppHtml;

  // Scene Cards
  const sceneHtml = data.scenes.map((s, si) => {
    const itemsHtml = s.items.map(item => {
      const tagsHtml = (item.tags || []).map(t =>
        `<span class="tag tag-${t.type}">${t.text}</span>`
      ).join('');
      const oppBoxHtml = item.oppBox ? `
        <div class="opp-box ${item.oppBox.type === 'high' ? '' : item.oppBox.type}">
          <div class="opp-title">${item.oppBox.title}</div>
          <div class="opp-desc">${item.oppBox.desc}</div>
        </div>
      ` : '';
      return `
        <div class="scene-item">
          <div class="scene-name">
            ${item.name}
            <span class="opp opp-${item.opp === 'high' ? 'high' : item.opp === 'mid' ? 'mid' : 'low'}">${item.oppLabel}</span>
          </div>
          <div class="scene-desc">${item.desc}</div>
          <div class="scene-tags">${tagsHtml}</div>
          ${oppBoxHtml}
        </div>
      `;
    }).join('');

    return `
      <div class="card" id="card-${si}">
        <div class="card-head" onclick="toggleCard('card-${si}')">
          <div class="card-icon" style="background:${s.color}15">${s.icon}</div>
          <div class="card-info">
            <div class="card-title">${s.name}</div>
            <div class="card-subtitle">${s.summary}</div>
          </div>
          <div class="card-arrow">▼</div>
        </div>
        <div class="card-body">
          <div class="card-content">
            ${itemsHtml}
          </div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('scene-cards').innerHTML = sceneHtml;

  // Competitors
  const compHtml = data.competitors.map(c => `
    <div class="comp-card">
      <div class="comp-name">${c.icon} ${c.name}</div>
      <div class="comp-desc">${c.desc}</div>
    </div>
  `).join('');
  document.getElementById('comp-grid').innerHTML = compHtml;

  // Suggestions
  const sugHtml = data.suggestions.map(s =>
    `<div class="suggest-item">${s}</div>`
  ).join('');
  document.getElementById('suggest-box').innerHTML =
    `<div class="suggest-title">💡 今日建议</div>` + sugHtml;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
}

// Init
render(REPORT);
</script>
</body>
</html>
