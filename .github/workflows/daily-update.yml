name: Daily Radar Update

on:
  schedule:
    - cron: '5 10 * * *'
  workflow_dispatch:
    inputs:
      report_json:
        description: 'Optional full REPORT JSON payload. If empty, the workflow generates a source-backed RSS draft.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-radar-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Generate daily report
        env:
          REPORT_JSON: ${{ inputs.report_json }}
        run: |
          REPORT_DATE="$(TZ=Asia/Shanghai date +%F)"
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          node scripts/update-daily-report.mjs --date "$REPORT_DATE"

      - name: Verify static site
        run: node scripts/verify-site.mjs --today "$REPORT_DATE" --max-age-days 0

      - name: Run end-to-end smoke test
        env:
          E2E_REQUIRE_BROWSER: '1'
        run: node scripts/e2e-site.mjs --today "$REPORT_DATE"

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No daily changes to commit."
            exit 0
          fi
          git config user.name "AI Radar Bot"
          git config user.email "radar@jd.com"
          git add index.html archive/index.json archive/*.html archive/last-updated.json
          git commit -m "daily: ${REPORT_DATE}雷达自动更新"
          git pull --rebase origin main
          git push origin HEAD:main
