<head>

<title>AI支付场景雷达</title>
<style>
  :root {
    --jd-red: #E2231A;
    --jd-dark: #1A1A2E;
    --jd-card: #16213E;
    --jd-card2: #0F3460;
    --accent-gold: #F2A900;
    --accent-green: #00C9A7;
    --accent-blue: #4CC9F0;
    --text-primary: #F8F9FA;
    --text-secondary: #A0AEC0;
    --danger: #FF6B6B;
    --warning: #FFD93D;
    --success: #6BCB77;
    --bg: #0D1117;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--jd-red) 0%, #B91C1C 50%, var(--jd-dark) 100%);
    padding: 28px 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-title .icon { font-size: 28px; }
  .header-date {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 16px;
    margin: -12px 12px 12px;
    background: var(--jd-card);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;
  }
  .stat-item {
    text-align: center;
    padding: 8px 4px;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-gold), #FF6B6B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-num.green { background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); -webkit-background-clip: text; }
  .stat-num.red { background: linear-gradient(135deg, #FF6B6B, var(--jd-red)); -webkit-background-clip: text; }
  .stat-num.blue { background: linear-gradient(135deg, var(--accent-blue), #7B61FF); -webkit-background-clip: text; }
  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* Section */
  .section {
    padding: 0 12px;
    margin-bottom: 16px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0 8px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .section-header .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge-hot { background: var(--jd-red); color: #fff; }
  .badge-new { background: var(--accent-green); color: #000; }

  /* News Cards */
  .news-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 4px 0 12px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .news-scroll::-webkit-scrollbar { display: none; }
  .news-card {
    min-width: 260px;
    max-width: 260px;
    background: var(--jd-card);
    border-radius: 14px;
    padding: 16px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  .news-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .news-card:nth-child(1)::before { background: var(--jd-red); }
  .news-card:nth-child(2)::before { background: var(--accent-gold); }
  .news-card:nth-child(3)::before { background: var(--accent-blue); }
  .news-rank {
    width: 22px; height: 22px;
    background: var(--jd-red);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 10px;
  }
  .news-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-summary {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-source {
    margin-top: 10px;
    font-size: 10px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
  }

  /* Expandable Cards */
  .card {
    background: var(--jd-card);
    border-radius: 14px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.04);
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .card.expanded {
    border-color: rgba(226,35,26,0.3);
    box-shadow: 0 4px 20px rgba(226,35,26,0.1);
  }
  .card-head {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card-head:active { opacity: 0.8; }
  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-subtitle {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-arrow {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: transform 0.3s ease;
    flex-shrink: 0;
    font-size: 12px;
  }
  .card.expanded .card-arrow { transform: rotate(180deg); }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .card.expanded .card-body { max-height: 2000px; }
  .card-content {
    padding: 0 16px 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  /* Scene Items */
  .scene-item {
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .scene-item:last-child { border-bottom: none; }
  .scene-name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .scene-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    line-height: 1.6;
  }
  .scene-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag-volume { background: rgba(76,201,240,0.15); color: var(--accent-blue); }
  .tag-tech { background: rgba(123,97,255,0.15); color: #7B61FF; }
  .tag-pay { background: rgba(242,169,0,0.15); color: var(--accent-gold); }

  /* Opportunity Indicator */
  .opp {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .opp-high { background: rgba(226,35,26,0.2); color: #FF6B6B; }
  .opp-mid { background: rgba(255,217,61,0.2); color: var(--warning); }
  .opp-low { background: rgba(107,203,119,0.15); color: var(--success); }

  .opp-box {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(226,35,26,0.08);
    border-left: 3px solid var(--jd-red);
  }
  .opp-box.mid { background: rgba(255,217,61,0.06); border-left-color: var(--warning); }
  .opp-box.low { background: rgba(107,203,119,0.06); border-left-color: var(--success); }
  .opp-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--jd-red);
    margin-bottom: 4px;
  }
  .opp-box.mid .opp-title { color: var(--warning); }
  .opp-box.low .opp-title { color: var(--success); }
  .opp-desc {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Opportunity Board */
  .opp-board {
    background: linear-gradient(135deg, rgba(226,35,26,0.12), rgba(242,169,0,0.08));
    border: 1px solid rgba(226,35,26,0.2);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .opp-board-title {
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .opp-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .opp-row:last-child { border-bottom: none; }
  .opp-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .opp-dot.high { background: var(--danger); box-shadow: 0 0 8px rgba(255,107,107,0.5); }
  .opp-dot.mid { background: var(--warning); box-shadow: 0 0 8px rgba(255,217,61,0.5); }
  .opp-dot.low { background: var(--success); box-shadow: 0 0 8px rgba(107,203,119,0.5); }
  .opp-text { flex: 1; }
  .opp-text-title { font-size: 13px; font-weight: 700; }
  .opp-text-desc { font-size: 11px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
  .opp-value {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
    background: rgba(226,35,26,0.15);
    color: #FF6B6B;
  }

  /* Competitor Section */
  .comp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .comp-card {
    background: var(--jd-card);
    border-radius: 12px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .comp-name {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .comp-desc {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Suggestion Box */
  .suggest-box {
    background: linear-gradient(135deg, var(--jd-card2), var(--jd-card));
    border-radius: 14px;
    padding: 16px;
    border: 1px solid rgba(76,201,240,0.2);
  }
  .suggest-title {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .suggest-item {
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .suggest-item strong {
    color: var(--text-primary);
    font-weight: 700;
  }
  .suggest-item:last-child { margin-bottom: 0; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
  }
  .footer a { color: var(--jd-red); text-decoration: none; }

  /* Data loading placeholder */
  .data-time { font-size: 10px; color: var(--text-secondary); }

  /* Pulse animation for live dot */
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }
</style>

// ============================================================
// RENDER
// ============================================================
function render(data) {
  // Date
  document.getElementById('report-date').textContent = data.date;

  // Stats
  document.getElementById('stat-high').textContent = data.stats.high;
  document.getElementById('stat-scenes').textContent = data.stats.scenes;
  document.getElementById('stat-news').textContent = data.stats.news;
  document.getElementById('stat-compete').textContent = data.stats.compete;

  // News
  const newsHtml = data.news.map((n, i) => `
    <div class="news-card">
      <div class="news-rank">${i + 1}</div>
      <div class="news-title">${n.title}</div>
      <div class="news-summary">${n.summary}</div>
      <div class="news-source">
        <span>${n.source}</span>
        <span>${n.time}</span>
      </div>
    </div>
  `).join('');
  document.getElementById('news-scroll').innerHTML = newsHtml;

  // Opportunity Board
  const oppHtml = data.opportunities.map(o => `
    <div class="opp-row">
      <div class="opp-dot ${o.level === 'high' ? 'high' : o.level === 'mid' ? 'mid' : 'low'}"></div>
      <div class="opp-text">
        <div class="opp-text-title">${o.scene}</div>
        <div class="opp-text-desc">${o.reason}<br>💡 ${o.action}</div>
      </div>
      <div class="opp-value">${o.value}</div>
    </div>
  `).join('');
  document.getElementById('opp-board').innerHTML =
    `<div class="opp-board-title">🎯 商机看板 · ${data.stats.high}个高优</div>` + oppHtml;

  // Scene Cards
  const sceneHtml = data.scenes.map((s, si) => {
    const itemsHtml = s.items.map(item => {
      const tagsHtml = (item.tags || []).map(t =>
        `<span class="tag tag-${t.type}">${t.text}</span>`
      ).join('');
      const oppBoxHtml = item.oppBox ? `
        <div class="opp-box ${item.oppBox.type === 'high' ? '' : item.oppBox.type}">
          <div class="opp-title">${item.oppBox.title}</div>
          <div class="opp-desc">${item.oppBox.desc}</div>
        </div>
      ` : '';
      return `
        <div class="scene-item">
          <div class="scene-name">
            ${item.name}
            <span class="opp opp-${item.opp === 'high' ? 'high' : item.opp === 'mid' ? 'mid' : 'low'}">${item.oppLabel}</span>
          </div>
          <div class="scene-desc">${item.desc}</div>
          <div class="scene-tags">${tagsHtml}</div>
          ${oppBoxHtml}
        </div>
      `;
    }).join('');

    return `
      <div class="card" id="card-${si}">
        <div class="card-head" onclick="toggleCard('card-${si}')">
          <div class="card-icon" style="background:${s.color}22">${s.icon}</div>
          <div class="card-info">
            <div class="card-title">${s.name}</div>
            <div class="card-subtitle">${s.summary}</div>
          </div>
          <div class="card-arrow">▼</div>
        </div>
        <div class="card-body">
          <div class="card-content">
            ${itemsHtml}
          </div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('scene-cards').innerHTML = sceneHtml;

  // Competitors
  const compHtml = data.competitors.map(c => `
    <div class="comp-card">
      <div class="comp-name">${c.icon} ${c.name}</div>
      <div class="comp-desc">${c.desc}</div>
    </div>
  `).join('');
  document.getElementById('comp-grid').innerHTML = compHtml;

  // Suggestions
  const sugHtml = data.suggestions.map(s =>
    `<div class="suggest-item">${s}</div>`
  ).join('');
  document.getElementById('suggest-box').innerHTML =
    `<div class="suggest-title">💡 今日建议</div>` + sugHtml;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
}

// Init
render(REPORT);
</script>
