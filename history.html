<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>历史日报 · AI支付场景雷达</title>
<style>
  :root {
    --jd-red: #E2231A;
    --jd-red-light: #FFF1F0;
    --bg: #F7F8FC;
    --bg-white: #FFFFFF;
    --text-primary: #1A1D2E;
    --text-secondary: #6B7280;
    --text-tertiary: #9CA3AF;
    --border: #E8ECF4;
    --accent-blue: #3B82F6;
    --accent-blue-light: #EFF6FF;
    --accent-green: #10B981;
    --accent-amber: #F59E0B;
    --accent-purple: #8B5CF6;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.03);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--bg-white);
    padding: 32px 20px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20px;
    right: 20px;
    height: 3px;
    background: linear-gradient(90deg, var(--jd-red), var(--accent-blue));
    border-radius: 2px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--jd-red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    background: var(--jd-red);
    color: white;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all .2s;
  }
  .back-btn:hover { opacity: .9; transform: translateY(-1px); }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .container {
    max-width: 680px;
    margin: 24px auto;
    padding: 0 16px;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .list-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .list-count {
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 12px;
  }

  .day-card {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .day-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
    border-color: rgba(226,35,26,.15);
  }
  .day-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .day-date {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .day-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .day-title {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .day-stats {
    display: flex;
    gap: 12px;
  }
  .day-stat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .day-stat-num {
    font-weight: 700;
    color: var(--text-secondary);
  }

  .footer {
    text-align: center;
    padding: 32px 20px;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .header { padding: 20px 16px; }
    .day-stats { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <span class="logo-text">历史日报</span>
    </div>
    <a class="back-btn" href="index.html">← 返回今日</a>
  </div>
  <div class="subtitle">AI支付场景雷达 · 每日情报归档</div>
</div>

<div class="container">
  <div class="list-header">
    <div class="list-title">📅 全部日报</div>
    <div class="list-count" id="count">加载中...</div>
  </div>
  <div id="list">
    <div class="empty">加载中...</div>
  </div>
</div>

<div class="footer">
  POWERED BY 京东AI付 · HERMES AGENT<br>
  <a href="index.html" style="color:var(--jd-red);text-decoration:none;">返回今日日报</a>
</div>

<script>
const colorMap = {
  high: ['🔴', 'var(--jd-red)', 'var(--jd-red-light)'],
  scenes: ['📱', 'var(--accent-blue)', 'var(--accent-blue-light)'],
  news: ['📰', 'var(--accent-amber)', ''],
  compete: ['⚔️', 'var(--accent-purple)', '']
};

async function loadHistory() {
  try {
    const resp = await fetch('archive/index.json?' + Date.now());
    const data = await resp.json();
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    
    countEl.textContent = `共 ${data.length} 期`;
    
    if (data.length === 0) {
      listEl.innerHTML = '<div class="empty">暂无历史日报</div>';
      return;
    }
    
    listEl.innerHTML = data.map((item, idx) => {
      const d = new Date(item.date);
      const weekdays = ['日','一','二','三','四','五','六'];
      const dateStr = `${item.date} 周${weekdays[d.getDay()]}`;
      const badge = idx === 0 
        ? `<span class="day-badge" style="background:var(--jd-red-light);color:var(--jd-red)">最新</span>`
        : `<span class="day-badge" style="background:var(--bg);color:var(--text-tertiary)">第${data.length - idx}期</span>`;
      
      const stats = item.stats || {};
      const statsHtml = `
        <div class="day-stat">🔴 <span class="day-stat-num">${stats.high || 0}</span> 高优</div>
        <div class="day-stat">📱 <span class="day-stat-num">${stats.scenes || 0}</span> 场景</div>
        <div class="day-stat">📰 <span class="day-stat-num">${stats.news || 0}</span> 要闻</div>
        <div class="day-stat">⚔️ <span class="day-stat-num">${stats.compete || 0}</span> 竞品</div>
      `;
      
      return `
        <a class="day-card" href="archive/${item.date}.html">
          <div class="day-card-top">
            <div class="day-date">${dateStr}</div>
            ${badge}
          </div>
          <div class="day-title">${item.title}</div>
          <div class="day-stats">${statsHtml}</div>
        </a>
      `;
    }).join('');
    
  } catch(e) {
    document.getElementById('list').innerHTML = 
      '<div class="empty">⚠️ 加载失败，请稍后重试<br><small>' + e.message + '</small></div>';
  }
}

loadHistory();
</script>
</body>
</html>
